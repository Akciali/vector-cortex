<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="1" stop-color="#0a0716"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.55" stop-color="#5cc8ff"/>
      <stop offset="1" stop-color="#a259ff"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- decorative node-graph on the right -->
  <g stroke="#1d3a52" stroke-width="1" opacity="0.8">
    <line x1="880" y1="80"  x2="980" y2="150"/>
    <line x1="980" y1="150" x2="1080" y2="110"/>
    <line x1="980" y1="150" x2="1010" y2="250"/>
    <line x1="1010" y1="250" x2="1110" y2="220"/>
    <line x1="880" y1="80"  x2="930" y2="200"/>
    <line x1="930" y1="200" x2="1010" y2="250"/>
    <line x1="1080" y1="110" x2="1140" y2="180"/>
  </g>
  <g>
    <circle cx="880"  cy="80"  r="4.5" fill="#00e5ff" filter="url(#glow)"/>
    <circle cx="980"  cy="150" r="6"   fill="#a259ff" filter="url(#glow)"/>
    <circle cx="1080" cy="110" r="4"   fill="#39ff14" filter="url(#glow)"/>
    <circle cx="1010" cy="250" r="5"   fill="#ffd700" filter="url(#glow)"/>
    <circle cx="1110" cy="220" r="3.5" fill="#00e5ff"/>
    <circle cx="930"  cy="200" r="3.5" fill="#5cc8ff"/>
    <circle cx="1140" cy="180" r="3"   fill="#a259ff"/>
  </g>

  <!-- wordmark -->
  <text x="64" y="158" font-size="92" font-weight="700" letter-spacing="-2"
        fill="url(#ink)" filter="url(#glow)">cortex</text>
  <text x="70" y="206" font-size="20" letter-spacing="7" fill="#8595ad">TOPOLOGIES OF THOUGHT<tspan fill="#ffae5c"> &#10022;</tspan></text>

  <!-- tagline -->
  <text x="70" y="256" font-size="19" fill="#cfe0f3">navigate an AI&#39;s memory with your hands, in the browser</text>

  <!-- chips -->
  <g font-size="12" letter-spacing="1">
    <rect x="70"  y="282" width="146" height="30" rx="15" fill="rgba(0,229,255,0.07)" stroke="#1d4a5a"/>
    <text x="143" y="302" text-anchor="middle" fill="#bfe9ff">no backend</text>
    <rect x="226" y="282" width="158" height="30" rx="15" fill="rgba(162,89,255,0.07)" stroke="#3a2a5a"/>
    <text x="305" y="302" text-anchor="middle" fill="#d8c4ff">privacy-first</text>
    <rect x="394" y="282" width="210" height="30" rx="15" fill="rgba(57,255,20,0.06)" stroke="#234a23"/>
    <text x="499" y="302" text-anchor="middle" fill="#bff5c0">WebGL &#183; MediaPipe</text>
  </g>

  <rect width="1200" height="340" fill="url(#vign)"/>
</svg>
