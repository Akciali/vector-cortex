<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" width="1120" height="600" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/><stop offset="1" stop-color="#080611"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5cc8ff"/>
    </marker>
    <marker id="arrV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a259ff"/>
    </marker>
  </defs>
  <style>
    .t{fill:#f2f6ff;font-size:15px;font-weight:600}
    .s{fill:#8595ad;font-size:11.5px}
    .lbl{fill:#5cc8ff;font-size:10px;letter-spacing:.5px}
    .hd{fill:#00e5ff;font-size:12px;letter-spacing:3px}
    .edge{stroke:#5cc8ff;stroke-width:1.6;fill:none}
    .edgeV{stroke:#a259ff;stroke-width:1.6;fill:none}
    .node{fill:rgba(10,14,22,.75);stroke-width:1.4}
  </style>

  <rect width="1120" height="600" fill="url(#bgA)"/>

  <text x="40" y="42" class="hd">HOW IT WORKS</text>
  <text x="40" y="62" class="s">Everything runs in your browser. Nothing is uploaded, stored, or sent to a server.</text>

  <!-- BROWSER container -->
  <rect x="40" y="84" width="770" height="424" rx="20" fill="rgba(0,229,255,.03)" stroke="#154a5a" stroke-width="1.5" stroke-dasharray="7 6"/>
  <circle cx="64" cy="116" r="4" fill="#00e5ff" filter="url(#g)"/>
  <text x="78" y="120" class="hd" font-size="13">YOUR BROWSER</text>

  <!-- vision pipeline (left) -->
  <g>
    <rect class="node" x="70" y="150" width="150" height="56" rx="12" stroke="#1d4a5a"/>
    <text x="145" y="174" text-anchor="middle" class="t">Webcam</text>
    <text x="145" y="192" text-anchor="middle" class="s">your camera feed</text>

    <rect class="node" x="70" y="240" width="150" height="64" rx="12" stroke="#1d4a5a"/>
    <text x="145" y="266" text-anchor="middle" class="t">MediaPipe Hands</text>
    <text x="145" y="285" text-anchor="middle" class="s">WASM &#183; on-device</text>

    <rect class="node" x="70" y="338" width="150" height="56" rx="12" stroke="#1d4a5a"/>
    <text x="145" y="362" text-anchor="middle" class="t">Gestures</text>
    <text x="145" y="380" text-anchor="middle" class="s">21 landmarks &#8594; intent</text>
  </g>
  <line class="edge" x1="145" y1="206" x2="145" y2="238" marker-end="url(#arr)"/>
  <line class="edge" x1="145" y1="304" x2="145" y2="336" marker-end="url(#arr)"/>

  <!-- renderer hub (center) -->
  <rect x="318" y="206" width="216" height="162" rx="16" fill="rgba(0,229,255,.06)" stroke="#00e5ff" stroke-width="1.8" filter="url(#g)"/>
  <text x="426" y="244" text-anchor="middle" class="t" font-size="17">Three.js &#183; Canvas</text>
  <text x="426" y="266" text-anchor="middle" class="s">2-D neural graph renderer</text>
  <text x="426" y="312" text-anchor="middle" fill="#bfe9ff" font-size="11.5">distributed</text>
  <text x="426" y="330" text-anchor="middle" fill="#d8c4ff" font-size="11.5">centralized</text>
  <text x="426" y="348" text-anchor="middle" fill="#bff5c0" font-size="11.5">morphogenesis</text>

  <!-- gestures -> hub -->
  <path class="edge" d="M220 366 C 270 366, 280 320, 316 312" marker-end="url(#arr)"/>
  <text x="246" y="350" class="lbl">control</text>

  <!-- search (below the hub, inside browser) -->
  <rect class="node" x="556" y="398" width="196" height="66" rx="12" stroke="#3a2a5a"/>
  <text x="654" y="425" text-anchor="middle" class="t">Curated search</text>
  <text x="654" y="445" text-anchor="middle" class="s">runs in-browser</text>
  <path class="edgeV" d="M628 398 C 592 384, 552 376, 514 366" marker-end="url(#arrV)"/>
  <text x="560" y="392" class="lbl" fill="#c9a8ff">highlights</text>

  <!-- STATIC HOST (outside) -->
  <rect x="850" y="198" width="232" height="156" rx="16" fill="rgba(162,89,255,.05)" stroke="#3a2a5a" stroke-width="1.5"/>
  <text x="966" y="226" text-anchor="middle" class="t">Static host</text>
  <text x="966" y="245" text-anchor="middle" class="s">GitHub Pages &#183; any CDN</text>
  <g font-size="10.5" fill="#cfe0f3">
    <rect x="872" y="262" width="188" height="24" rx="6" fill="rgba(255,255,255,.04)" stroke="#2a3550"/>
    <text x="966" y="278" text-anchor="middle">index.html</text>
    <rect x="872" y="292" width="90" height="24" rx="6" fill="rgba(0,229,255,.06)" stroke="#1d4a5a"/>
    <text x="917" y="308" text-anchor="middle">graph.json</text>
    <rect x="970" y="292" width="90" height="24" rx="6" fill="rgba(255,215,0,.06)" stroke="#4a431d"/>
    <text x="1015" y="308" text-anchor="middle">queries.json</text>
  </g>
  <!-- static -> hub (crosses the browser boundary) -->
  <path class="edge" d="M850 276 C 720 268, 640 258, 536 250" marker-end="url(#arr)"/>
  <text x="654" y="244" text-anchor="middle" class="lbl">fetch (static files)</text>

  <!-- NO BACKEND callout -->
  <rect x="850" y="378" width="232" height="74" rx="14" fill="rgba(255,90,90,.04)" stroke="#5a2a2a" stroke-width="1.4"/>
  <text x="872" y="408" font-size="20" fill="#ff6b6b">&#10005;</text>
  <text x="902" y="404" class="t" fill="#ffb3b3">No server</text>
  <text x="902" y="424" class="s" fill="#c98f8f">no database &#183; no API</text>
  <text x="902" y="440" class="s" fill="#c98f8f">no credentials shipped</text>

  <!-- privacy banner -->
  <rect x="40" y="524" width="1042" height="52" rx="13" fill="rgba(0,229,255,.05)" stroke="#1d4a5a" stroke-width="1.3"/>
  <text x="561" y="555" text-anchor="middle" fill="#cfe0f3" font-size="13.5">
    &#128274;  Camera frames never leave your device  &#183;  no upload  &#183;  no tracking  &#183;  no cookies
  </text>
</svg>
